[DEFAULT]

## ========== Custom Configuration ==========
container_images_file = /home/stack/redbook/rhosp-16.2/containers-prepare-parameters.yaml
custom_env_files = /home/stack/redbook/rhosp-16.2/custom-undercloud-params.yaml
hieradata_override = /home/stack/redbook/rhosp-16.2/hieradata.yaml

## ========== Feature Toggles ==========
enable_telemetry = false
enable_validations = true
enable_ui = false
generate_service_certificate = false
cleanup = true

## ========== Host & Network Configuration ==========
undercloud_hostname = director-rhosp-16.2.kvm.lab.com

# Use your actual provisioning interface (check with `ip a`)
local_interface = enp1s0
inspection_interface = enp1s0
enable_node_discovery = true
inspection_dhcp_wait_timeout = 180

local_ip = 192.168.200.10/24
local_mtu = 1500
ip_version = 4

# DNS for the undercloud
undercloud_nameservers = 192.168.122.1

# Overcloud domain (used by deployed nodes)
overcloud_domain_name = rhosp16.kvm.lab

# Admin and public endpoints (optional overrides)
undercloud_admin_host = 192.168.200.3
undercloud_public_host = 192.168.200.4

## ========== Logging & Debug ==========
undercloud_debug = true
log_file = /home/stack/undercloud-install.log
undercloud_timezone = Asia/Kolkata

## ========== Time Sync ==========
undercloud_ntp_servers = 0.pool.ntp.org,1.pool.ntp.org


[ctlplane-subnet]

# Required subnet information (replaces deprecated settings in DEFAULT)
cidr = 192.168.200.0/24
gateway = 192.168.200.1
dhcp_start = 192.168.200.101
dhcp_end = 192.168.200.220

# Optional: specify range used during introspection
inspection_iprange = 192.168.200.221,192.168.200.250

# Optional: enable NAT for the ctlplane network if needed
masquerade = true
